# Recipe harvest targets for the `recipe` lane (keyless Reddit/YouTube social proof).
#
# Schema: a top-level `recipes:` list. Each block:
#   name:        (required) the dish to research, as you'd name it
#   cuisine:     one of the allowed cuisines (Mediterranean/Italian/Mexican/…) (optional metadata)
#   protein:     one of the allowed proteins (Chicken/Beef/Seafood/Lamb/Vegetarian) (optional metadata)
#   subreddits:  comma-separated subreddit hints, no r/ prefix                    (optional)
#
# Curation rules for this library: NO pork; NO Chinese/Korean; favor Mediterranean/Italian/Mexican;
# restaurant-quality-at-home dishes that use common pantry ingredients and basic tools.

